on: [push]
run-name: Hello GITHUB ACTIONS!
jobs:
  my_first_job:
    runs-on: ubuntu:latest
    steps:
        - name: Checkout
          uses: actions/checkout@v3
        - name: Setup node
          uses: actions/setup-node@v3
          with:
            node-version: 16.13.x
            cache: npm
        - name: Install
          run: npm ci
          name: List files in the repository
          run: |
            ls ${{ github.workspace }}